<style>
  :root {

function makeGridTexture(cells, lineHex, fillHex, glow) {
  const S = 512;
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const g = cv.getContext('2d');
  if (fillHex) { g.fillStyle = fillHex; g.fillRect(0, 0, S, S); }
  g.strokeStyle = lineHex; g.lineWidth = 2.5;
  g.shadowColor = lineHex; g.shadowBlur = glow || 6;
  const step = S / cells;
  g.beginPath();
  for (let i = 0; i <= cells; i++) {
    const p = Math.round(i * step) + 0.5;
    g.moveTo(p, 0); g.lineTo(p, S);
    g.moveTo(0, p); g.lineTo(S, p);
  }
  g.stroke();
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = 4;
  return tex;
}

function applyWave(t) {
  const on = !!t.wave;
  for (const seg of segments) {
    const gm = seg.ground.material, rm = seg.road.material;
    gm.wireframe = false;
    gm.map = on ? groundGridTex : null;
    gm.emissiveMap = on ? groundGridTex : null;
    gm.transparent = false;
    if (gm.emissive) { gm.emissive.setHex(on ? 0xe64bff : 0x000000); gm.emissiveIntensity = on ? 0.9 : 1; }
    gm.color.setHex(on ? 0xffffff : (gm.userData.pKey && THEMES[themeName][gm.userData.pKey]) || 0xb7bcc4);
    gm.needsUpdate = true;
    rm.wireframe = false;
    rm.map = on ? streetGridTex : null;
    rm.emissiveMap = on ? streetGridTex : null;
    rm.transparent = false;
    if (rm.emissive) { rm.emissive.setHex(on ? 0x7fe8ff : 0x000000); rm.emissiveIntensity = on ? 1.0 : 1; }
    rm.color.setHex(on ? 0xffffff : ((rm.userData.pKey && THEMES[themeName][rm.userData.pKey]) || 0x3a3e47));
    rm.needsUpdate = true;
    for (const e of seg.edges) e.visible = !on;
    for (const d of seg.dashes) d.visible = !on;
  }
  for (const mt of mountains) {
    if (mt.userData.outline) mt.userData.outline.visible = on;
    mt.traverse(o => { if (o.isMesh && o.material && !o.isLineSegments) {
      const mm = o.material;
      if (mm.userData.origColor === undefined) mm.userData.origColor = mm.color.getHex();
      mm.color.setHex(on ? t.mtn : mm.userData.origColor);
      mm.transparent = false;
      mm.opacity = 1;

  for (const tr of trees) tr.visible = !on;
  for (const m of themedMats) {
    const k = m.userData.pKey;
    if (k === 'car' || k === 'carDark' || k === 'glass') {
      m.emissive.setHex(0x000000); m.emissiveIntensity = 1;

    const cl = window.__carLights;
    cl.head.emissive.setHex(on ? 0xffe27a : cl.headBase);
    cl.head.emissiveIntensity = on ? 1.4 : 1;
    cl.tail.emissive.setHex(on ? 0xff2f6a : cl.tailBase);
    cl.tail.emissiveIntensity = on ? 1.2 : 1;

// road curve
let flattenZ = null;
function rawCurveAt(z) {
  const p = -z;
  return Math.sin(p * 0.0011) * 34
       + Math.sin(p * 0.00062 + 2.1) * 22
       + Math.sin(p * 0.0034 + 0.7) * 20
       + Math.sin(p * 0.0072 + 4.2) * 10;
}
function curveAt(z) {
  const base = rawCurveAt(z);
  if (flattenZ === null) return base;
  const target = rawCurveAt(flattenZ);
  const t = Math.min(1, Math.max(0, (z - flattenZ) / 120));
  const ease = t*t*(3 - 2*t);
  return target + (base - target) * ease;
}
function curveSlopeAt(z) {
  const h = 2.0;
  return (curveAt(z - h) - curveAt(z + h)) / (2*h);
}

// hills
let hillTarget = 0;
let hillAmt = 0;
function rawHillAt(z) {
  if (hillAmt < 0.001) return 0;
  const p = -z;
  return (Math.sin(p * 0.0075 + 0.6) * 16
        + Math.sin(p * 0.019 + 2.3) * 4)
        * hillAmt;
}
function hillAt(z) {
  const base = rawHillAt(z);
  if (flattenZ === null) return base;
  const target = rawHillAt(flattenZ);
  const t = Math.min(1, Math.max(0, (z - flattenZ) / 120));
  const ease = t*t*(3 - 2*t);
  return target + (base - target) * ease;
}
function hillSlopeAt(z) {
  const h = 2.0;
  return (hillAt(z - h) - hillAt(z + h)) / (2*h);
}

function makeSegment(i) {

const _cz = new Float32Array(64), _ch = new Float32Array(64), _cy = new Float32Array(64);
function warpMeshFast(mesh, originZ, yLift) {
  const pos = mesh.geometry.attributes.position;
  const baseX = mesh.userData.baseX;
  const arr = pos.array;
  const n = pos.count;
  let rows = 0;
  for (let i = 0; i < n; i++) {
    const ly = arr[i*3 + 1];
    let r = -1;
    for (let k = 0; k < rows; k++) if (_cy[k] === ly) { r = k; break; }
    if (r < 0) { r = rows++; _cy[r] = ly; const wz = originZ - ly; _cz[r] = curveAt(wz); _ch[r] = hillAt(wz) + yLift; }
    arr[i*3] = baseX[i] + _cz[r];
    arr[i*3 + 2] = _ch[r];
  }
  pos.needsUpdate = true;
}

function warpSegment(seg) {
  const originZ = seg.group.position.z;
  if (!seg.ground.userData.baseX) {
    for (const m of seg.warpList) {
      const p = m.geometry.attributes.position;
      const bx = new Float32Array(p.count);
      for (let i = 0; i < p.count; i++) bx[i] = p.array[i*3];
      m.userData.baseX = bx;
    }
    for (const e of seg.edges) {
      const bx = e.userData.baseX;
      for (let i = 0; i < bx.length; i++) bx[i] += e.userData.sx;
    }
  }
  warpMeshFast(seg.ground, originZ, 0);
  warpMeshFast(seg.road, originZ, 0.02);
  for (const e of seg.edges) warpMeshFast(e, originZ, 0.03);
  for (const dash of seg.dashes) {
    const worldZ = originZ + dash.userData.localZ;
    dash.position.set(curveAt(worldZ), hillAt(worldZ) + 0.06, dash.userData.localZ);
    const yaw = Math.atan(curveSlopeAt(worldZ));
    const pitch = Math.atan(hillSlopeAt(worldZ));
    dash.rotation.order = 'YXZ';
    dash.rotation.set(-Math.PI/2 + pitch, 0, -yaw);
  }
}

function makeMountain(far) {
  const h = far ? (34 + Math.random()*40) : (16 + Math.random()*20);
  const r = h * (0.7 + Math.random()*0.5);
  const sides = 5 + Math.floor(Math.random()*3);
  const geo = new THREE.ConeGeometry(r, h, sides);
  const p = geo.attributes.position;
  const seed = h * 0.7;
  const jitterFor = a => 0.82 + (Math.sin(a + seed)*0.3 + Math.sin(a*2 + seed*1.7)*0.2 + 0.5) * 0.4;
  for (let i = 0; i < p.count; i++) {
    const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
    if (y < h*0.4 && (x !== 0 || z !== 0)) {
      const a = Math.atan2(z, x);
      const k = jitterFor(a);
      p.setX(i, x * k);
      p.setZ(i, z * k);
    }
  }
  geo.computeVertexNormals();
  const m = new THREE.Mesh(geo, far ? mountMatFar : mountMat);
  m.position.y = h/2;
  m.castShadow = false; m.receiveShadow = false;
  const g = new THREE.Group();
  g.userData.height = h;
  g.add(m);
  const edges = new THREE.EdgesGeometry(geo, 18);
  const outline = new THREE.LineSegments(edges,
    new THREE.LineBasicMaterial({ color: far ? 0xff3fc8 : 0x4df0ff, fog: true }));
  outline.position.y = m.position.y;
  outline.visible = false;
  g.add(outline);
  g.userData.outline = outline;
  g.userData.far = far;
  scene.add(g);
  return g;
}

  mt.userData.offX = side * off;
  mt.position.set(curveAt(z) + side*off, hillAt(z), z);
  mt.rotation.y = Math.random()*Math.PI;
}

function makeIceTexture() {
  const w = 16, h = 48;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = false;
  for (let py = 0; py < h; py++) {
    for (let px = 0; px < w; px++) {
      // fade at edges
      const ex = 1 - Math.abs((px + 0.5) / w - 0.5) * 2;
      const edgeFade = Math.min(1, ex * 2.2);
      const n = Math.random();
      let a = (0.5 + n * 0.4) * edgeFade;
      if (n < 0.15) a *= 0.45;
      const v = 224 + Math.floor(Math.random() * 26);
      x.fillStyle = 'rgba(' + v + ',' + (v + 6) + ',255,' + a.toFixed(3) + ')';
      x.fillRect(px, py, 1, 1);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

// touch controls
let touchThrottle = false, touchBrake = false, touchSteer = 0;

const wheelEl = document.getElementById('wheel');
const wheelInner = document.getElementById('wheelInner');
if (wheelEl) {
  let wheelTouchId = null, startX = 0;
  const MAX_DRAG = 90;

  const onStart = (x, id) => { wheelTouchId = id; startX = x; };
  const onMove = (x) => {
    const dx = Math.max(-MAX_DRAG, Math.min(MAX_DRAG, x - startX));
    touchSteer = dx / MAX_DRAG;
    if (wheelInner) wheelInner.style.transform = `rotate(${touchSteer * 120}deg)`;
  };
  const onEnd = () => {
    wheelTouchId = null; touchSteer = 0;
    if (wheelInner) wheelInner.style.transform = 'rotate(0deg)';
  };

  wheelEl.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    onStart(t.clientX, t.identifier);
  }, {passive:false});
  wheelEl.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) if (t.identifier === wheelTouchId) onMove(t.clientX);
  }, {passive:false});
  wheelEl.addEventListener('touchend', e => {
    for (const t of e.changedTouches) if (t.identifier === wheelTouchId) onEnd();
  }, {passive:false});
  wheelEl.addEventListener('touchcancel', onEnd, {passive:false});

  wheelEl.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX, 'mouse');
    const mm = ev => onMove(ev.clientX);
    const mu = () => { onEnd(); removeEventListener('mousemove', mm); removeEventListener('mouseup', mu); };
    addEventListener('mousemove', mm); addEventListener('mouseup', mu);
  });
}

function bindPedal(id, set) {
  const el = document.getElementById(id);
  if (!el) return;
  const on = e => { e.preventDefault(); set(true); el.classList.add('down'); };
  const off = e => { if (e) e.preventDefault(); set(false); el.classList.remove('down'); };

let audio = null, audioOn = false;
const audioBtn = document.getElementById('audioBtn');

function initAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const master = ctx.createGain();
  master.gain.value = 0.0;
  master.connect(ctx.destination);

  const evGain = ctx.createGain(); evGain.gain.value = 0.0;
  const evFilter = ctx.createBiquadFilter();
  evFilter.type = 'lowpass'; evFilter.frequency.value = 520; evFilter.Q.value = 0.4;
  const osc1 = ctx.createOscillator(); osc1.type = 'triangle'; osc1.frequency.value = 60;
  const osc2 = ctx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = 60.4;
  const osc3 = ctx.createOscillator(); osc3.type = 'sine';     osc3.frequency.value = 30;
  const vib = ctx.createOscillator(); vib.frequency.value = 5.5;
  const vibGain = ctx.createGain(); vibGain.gain.value = 1.2;
  vib.connect(vibGain); vibGain.connect(osc1.frequency); vibGain.connect(osc2.frequency);
  osc1.connect(evFilter); osc2.connect(evFilter); osc3.connect(evFilter);
  evFilter.connect(evGain); evGain.connect(master);
  osc1.start(); osc2.start(); osc3.start(); vib.start();

  const noiseBuf = ctx.createBuffer(1, ctx.sampleRate*2, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
  const tireSrc = ctx.createBufferSource(); tireSrc.buffer = noiseBuf; tireSrc.loop = true;
  const tireFilter = ctx.createBiquadFilter(); tireFilter.type='bandpass';
  tireFilter.frequency.value = 500; tireFilter.Q.value = 0.7;
  const tireGain = ctx.createGain(); tireGain.gain.value = 0.0;
  tireSrc.connect(tireFilter); tireFilter.connect(tireGain); tireGain.connect(master);
  tireSrc.start();

  const windSrc = ctx.createBufferSource(); windSrc.buffer = noiseBuf; windSrc.loop = true;
  const windFilter = ctx.createBiquadFilter(); windFilter.type='bandpass';
  windFilter.frequency.value = 320; windFilter.Q.value = 1.2;
  const windGain = ctx.createGain(); windGain.gain.value = 0.02;
  const windLFO = ctx.createOscillator(); windLFO.frequency.value = 0.15;
  const windLFOGain = ctx.createGain(); windLFOGain.gain.value = 0.015;
  windLFO.connect(windLFOGain); windLFOGain.connect(windGain.gain);
  windSrc.connect(windFilter); windFilter.connect(windGain); windGain.connect(master);
  windSrc.start(); windLFO.start();

  const screechSrc = ctx.createBufferSource(); screechSrc.buffer = noiseBuf; screechSrc.loop = true;
  const screechFilter = ctx.createBiquadFilter(); screechFilter.type = 'bandpass';
  screechFilter.frequency.value = 1600; screechFilter.Q.value = 6;
  const screechGain = ctx.createGain(); screechGain.gain.value = 0.0;
  screechSrc.connect(screechFilter); screechFilter.connect(screechGain); screechGain.connect(master);
  screechSrc.start();

  audio = { ctx, master, evGain, evFilter, osc1, osc2, osc3, tireFilter, tireGain, windGain, screechGain, screechFilter };
}

function normalizeSCUrl(input) {
  if (!input) return null;
  input = input.trim();
  if (/^https?:\/\/(www\.)?soundcloud\.com\/[^\s]+/.test(input)) return input.split('?')[0];
  return null;
}

function ensureSC(cb) {
  if (window.SC && window.SC.Widget) { cb(); return; }
  const check = () => { if (window.SC && window.SC.Widget) cb(); };
  if (!scApiLoading) {
    scApiLoading = true;
    const s = document.createElement('script');
    s.src = 'https://w.soundcloud.com/player/api.js';
    s.onload = check;
    document.head.appendChild(s);
  } else {
    const iv = setInterval(() => { if (window.SC && window.SC.Widget) { clearInterval(iv); cb(); } }, 120);
  }
}

function buildWidgetSrc(trackUrl) {
  const params = 'auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&visual=false&buying=false&sharing=false&download=false';
  return 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(trackUrl) + '&' + params;
}

function setPlayIcon(playing) {
  isPlaying = playing;

function fmtTime(ms) {
  if (!ms || ms < 0) return '0:00';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

let seeking = false;
let trackDuration = 0;

function applyVolume() {
  if (scWidget && scReady) scWidget.setVolume(parseInt(mpVol.value, 10));
}

function loadTrack(trackUrl, title) {
  if (!trackUrl) return;
  mpNow.textContent = title || 'loading…';
  resetProgressUI();
  markActivePreset(trackUrl);
  ensureSC(() => {
    const container = document.getElementById('ytHost');
    const old = document.getElementById('scHost');
    if (old) old.remove();
    const host = document.createElement('iframe');
    host.id = 'scHost';
    host.allow = 'autoplay';
    host.frameBorder = 'no';
    host.src = buildWidgetSrc(trackUrl);
    container.appendChild(host);
    scReady = false;
    scWidget = SC.Widget(host);
    scWidget.bind(SC.Widget.Events.READY, () => {
      scReady = true;
      applyVolume();
      scWidget.play();
      setPlayIcon(true);
      scWidget.getDuration(d => { trackDuration = d; mpDur.textContent = fmtTime(d); });
      scWidget.getCurrentSound(s => { if (s && s.title) mpNow.textContent = s.title.toLowerCase(); });
      scWidget.bind(SC.Widget.Events.PLAY, () => {
        setPlayIcon(true);
        applyVolume();
        scWidget.getDuration(d => { trackDuration = d; mpDur.textContent = fmtTime(d); });
        scWidget.getCurrentSound(s => { if (s && s.title) mpNow.textContent = s.title.toLowerCase(); });
        scWidget.getCurrentSoundIndex(i => {
          if (i !== scCurIndex) { mpSeek.value = 0; mpCur.textContent = '0:00'; }
          scCurIndex = i;
        });
        scWidget.getSounds(list => { scTotal = (list && list.length) || 1; });
      });
      scWidget.bind(SC.Widget.Events.PAUSE, () => setPlayIcon(false));
      scWidget.bind(SC.Widget.Events.FINISH, () => {
        if (loopMode === 2 && scWidget && scReady) {
          // reloop same track
          if (scTotal > 1) scWidget.skip(scCurIndex);
          else { scWidget.seekTo(0); scWidget.play(); }
          resetProgressUI(); applyVolume();
          return;
        }
        // weird song playlist fix
        if (scCurIndex >= scTotal - 1) {
          if (loopMode === 1 && scWidget && scReady) {
            scWidget.skip(0); resetProgressUI(); scWidget.play(); applyVolume();
          } else {
            onPlaylistEnd();
          }
        }
      });
      scWidget.bind(SC.Widget.Events.PLAY_PROGRESS, e => {
        if (seeking) return;
        if (trackDuration > 0) {
          mpSeek.value = Math.round((e.currentPosition / trackDuration) * 1000);
          mpCur.textContent = fmtTime(e.currentPosition);
        }
      });
    });
  });
}

function markActivePreset(url) {

}

function playFromQueue(idx) {
  if (idx < 0 || idx >= queue.length) return;
  queueIdx = idx;
  loadTrack(queue[idx].url, queue[idx].title);
}
function resetProgressUI() {
  mpSeek.value = 0; mpCur.textContent = '0:00'; trackDuration = 0;
}
function playNext() {
  if (scWidget && scReady) { scWidget.next(); scWidget.seekTo(0); resetProgressUI(); applyVolume(); return; }
  if (queue.length) playFromQueue((queueIdx + 1) % queue.length);
}
function playPrev() {
  if (scWidget && scReady) { scWidget.prev(); scWidget.seekTo(0); resetProgressUI(); applyVolume(); return; }
  if (queue.length) playFromQueue((queueIdx - 1 + queue.length) % queue.length);
}
function onPlaylistEnd() {
  if (queueIdx < queue.length - 1) {
    playFromQueue(queueIdx + 1);
  } else {
    const preset = PRESETS[Math.floor(Math.random() * PRESETS.length)];
    let i = queue.findIndex(q => q.url === preset.url);
    if (i < 0) { queue.push({ url: preset.url, title: preset.title }); i = queue.length - 1; }
    playFromQueue(i);
  }
}

// recycling
function recycle() {
  const behindLine = state.worldZ + 30;
  let segMin = Infinity;
  for (const seg of segments) if (seg.group.position.z < segMin) segMin = seg.group.position.z;
  for (const seg of segments) {
    if (seg.group.position.z - SEG_LEN/2 > behindLine) {
      segMin -= SEG_LEN;
      seg.group.position.z = segMin;
    }
  }
  let treeMin = Infinity;
  for (const t of trees) if (t.position.z < treeMin) treeMin = t.position.z;
  for (const tree of trees) {
    if (tree.position.z - state.worldZ > 40) {
      treeMin -= (4.5 + Math.random()*5);
      placeTree(tree, treeMin);
    }
  }
  let mtMin = Infinity;
  for (const m of mountains) if (m.position.z < mtMin) mtMin = m.position.z;
  for (const mt of mountains) {
    if (mt.position.z - state.worldZ > 90) {
      mtMin -= (6 + Math.random()*6);
      placeMountain(mt, mtMin);
    }
  }
}

// main loop
const clock = new THREE.Clock();

function frame() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  hillAmt += (hillTarget - hillAmt) * Math.min(1, dt*1.5);

  // controls
  let up = keys['w'] || keys['arrowup'] || touchThrottle;
  let down = keys['s'] || keys['arrowdown'] || touchBrake;
  let steerInput = 0;
  if (keys['a'] || keys['arrowleft']) steerInput -= 1;
  if (keys['d'] || keys['arrowright']) steerInput += 1;
  steerInput += buttonMode ? btnSteer : touchSteer;
  steerInput = Math.max(-1, Math.min(1, steerInput));

  let autoCruising = false;
  if (autoDrive && phase === 'driving') {
    const centerNow = curveAt(state.worldZ);
    const off = state.carX - centerNow;
    const roadHdg = Math.atan(curveSlopeAt(state.worldZ));
    const aim = roadHdg - off * 0.05;
    let dh = aim - state.heading;
    steerInput = Math.max(-1, Math.min(1, dh * 3));
    autoCruising = true;
    up = false; down = false;
  }

  // finish reveal (disabled)
  if (false) {
    if (!house.visible) {
      houseZ = state.worldZ - 300;
      flattenZ = houseZ;
      house.visible = true;
      positionHouse();
      hillBtn.classList.add('locked');
    }
    positionHouse();
    const gx = house.position.x + garageMouth.position.x;
    const nearZ = (state.worldZ - houseZ) < 30;
    const alignedX = Math.abs(state.carX - gx) < 16;
    if (nearZ && alignedX) {
      phase = 'parking';
      parkT = 0;
    }
  }

  // park cutscene
  if (phase === 'parking') {
    parkT += dt;
    up = false; down = false; steerInput = 0;
    state.steer += (0 - state.steer) * Math.min(1, dt*4);
    const gx = house.position.x + garageMouth.position.x;
    const gz = house.position.z + garageMouth.position.z;
    const toX = gx - state.carX, toZ = gz - state.worldZ;
    const distToGarage = Math.hypot(toX, toZ);
    const desired = Math.atan2(toX, -toZ);
    let dh = desired - state.heading;
    while (dh > Math.PI) dh -= 2*Math.PI;
    while (dh < -Math.PI) dh += 2*Math.PI;
    state.heading += Math.max(-1.2*dt, Math.min(1.2*dt, dh));
    const targetSpeed = Math.max(0, Math.min(9, distToGarage * 0.6));
    state.speed += (targetSpeed - state.speed) * Math.min(1, dt*2.5);
    if (distToGarage < 1.2 || (parkT > 8 && state.speed < 0.3)) {
      state.speed = 0;
      phase = 'done';
      doneT = 0;
    }
    const mv = state.speed * dt;
    state.carX += mv * Math.sin(state.heading);
    state.worldZ -= mv * Math.cos(state.heading);
    state.distance += mv;
  }

  if (phase !== 'parking') {
    if (autoCruising) {
      const AUTO_CRUISE = 150 / (3.6 * SPEEDO);
      state.speed += (AUTO_CRUISE - state.speed) * Math.min(1, dt * 2.5);
    } else if (up) state.speed += 30 * dt;
    else if (down) state.speed -= 52 * dt;
    else state.speed -= 10 * dt;
    state.speed = Math.max(0, Math.min(state.maxSpeed, state.speed));
  }

  // driving
  if (phase !== 'parking') {
  const rollFactor = Math.min(1, state.speed / 10);
  const grip = state.onIce ? 0.25 : 1;
  state.steer += (steerInput - state.steer) * Math.min(1, dt*7);
  const steerRate = 1.5 * (1 - 0.4*Math.min(1, state.speed/state.maxSpeed));
  state.heading += state.steer * steerRate * rollFactor * grip * dt;
  state.heading = Math.max(-0.9, Math.min(0.9, state.heading));

  const move = state.speed * dt;
  state.carX += move * Math.sin(state.heading);
  state.worldZ -= move * Math.cos(state.heading);
  if (!waveMode) state.distance += move;

  const centerX = curveAt(state.worldZ);
  state.x = state.carX - centerX;

  let onGrass = false;
  if (!waveMode && phase === 'driving') {
    onGrass = Math.abs(state.x) > ROAD_W/2;
    if (onGrass) state.speed *= (1 - 1.1 * dt);
  }

  const edge = ROAD_W/2 + 8;
  if (state.x > edge)  { state.carX -= (state.x - edge) * 0.6 * dt; }
  if (state.x < -edge) { state.carX -= (state.x + edge) * 0.6 * dt; }

  const WALL = 46;
  if (state.x > WALL)  { state.carX = centerX + WALL;  state.x = WALL; }
  if (state.x < -WALL) { state.carX = centerX - WALL;  state.x = -WALL; }

  if (!waveMode) for (const tree of trees) {
    const dz = tree.position.z - state.worldZ;
    if (dz < -3 || dz > 5) continue;
    const dx = state.carX - tree.position.x;
    const dist = Math.hypot(dx, dz);
    const r = 0.6 * (tree.userData.baseScale || 1) + 1.0;
    if (dist < r && dist > 0.0001) {
      const push = (r - dist);
      state.carX += (dx / dist) * push;
      state.x = state.carX - centerX;
      state.speed *= 0.90;
    }
  }
  }

  for (const seg of segments) {
    seg.group.position.x = 0;
    warpSegment(seg);
  }
  const cullZ = -Infinity;
  const treeMul = (themeName === 'autumn') ? 1.9 : 1;
  for (const tree of trees) {
    if (waveMode) { tree.visible = false; continue; }
    tree.position.x = curveAt(tree.position.z) + tree.userData.offX;
    tree.position.y = hillAt(tree.position.z);
    const s = tree.userData.baseScale * treeMul;
    tree.scale.setScalar(s);
    tree.visible = true;
  }
  let onIce = false;
  if (iceGroup.visible) {
    for (const m of icePatches) {
      if (m.position.z - m.userData.halfL > state.worldZ + 40) {
        let far = state.worldZ;
        for (const o of icePatches) if (o.userData.side === m.userData.side) far = Math.min(far, o.position.z);
        m.userData.offX = edgeOffX(m.userData.side);
        m.position.z = far - ICE_SEG;
      }
      m.position.x = curveAt(m.position.z) + m.userData.offX;
      m.position.y = hillAt(m.position.z) + 0.06;
      const pitch = Math.atan(hillSlopeAt(m.position.z));
      const yaw = Math.atan(curveSlopeAt(m.position.z));
      m.rotation.order = 'YXZ';
      m.rotation.set(-Math.PI/2 + pitch, 0, -yaw);
      const dz = Math.abs(m.position.z - state.worldZ);
      const dx = Math.abs(m.position.x - state.carX);
      if (dz < m.userData.halfL && dx < m.userData.halfW) onIce = true;
    }
  }
  state.onIce = onIce;
  for (const mt of mountains) {
    const mz = mt.position.z;
    const vis = mz > cullZ;
    mt.visible = vis;
    if (!vis) continue;
    mt.position.x = curveAt(mz) + mt.userData.offX;
    const rad = (mt.userData.height || 30) * 0.8;
    const lowest = Math.min(hillAt(mz - rad), hillAt(mz), hillAt(mz + rad));
    mt.position.y = lowest - 1.5;
  }

  const roadY = hillAt(state.worldZ);
  car.position.z = state.worldZ;
  car.position.x = state.carX;

  car.rotation.z = state.steer * 0.05;
  car.rotation.y = -state.heading;
  car.rotation.x = Math.atan(hillSlopeAt(state.worldZ));
  const bob = Math.sin(t*20) * 0.01 * (state.speed/state.maxSpeed);
  car.position.y = roadY + bob;

  const spin = state.speed * dt * 2;
  for (let i=0;i<wheels.length;i++) {
    wheels[i].userData.spinner.rotation.x -= spin;
  }
  wheels[0].rotation.y = -state.steer * 0.45;
  wheels[1].rotation.y = -state.steer * 0.45;
  wheels[2].rotation.y = 0;
  wheels[3].rotation.y = 0;

  // tree sway
  const gust = 0.6 + 0.4*Math.sin(t*0.4);
  for (const tree of trees) {
    const d = tree.userData;
    tree.rotation.z = Math.sin(t*1.3 + d.sway) * d.swayAmt * gust;
  }

  // garage door
  if (phase === 'done') {
    doneT += dt;
    const door = house.userData.door;
    if (door) {
      const closeStart = 0.5, closeDur = 1.6;
      const k = Math.min(1, Math.max(0, (doneT - closeStart) / closeDur));
      const ease = k*k*(3 - 2*k);
      door.scale.y = 0.001 + (1 - 0.001) * ease;
      if (k >= 1 && !house.userData.carded) {
        house.userData.carded = true;
        showFinishCard();
      }
    }
  }

  // smoke
  if (house.visible && house.userData.smoke) {
    for (const puff of house.userData.smoke) {
      const rise = ((t*0.5 + puff.userData.phase) % 3);
      puff.position.y = puff.userData.baseY + rise*1.6;
      puff.position.x = puff.userData.baseX + Math.sin(t*0.6 + puff.userData.phase)*0.5 + rise*0.3;
      puff.position.z = puff.userData.baseZ;
      puff.material.opacity = 0.5 * (1 - rise/3);
      puff.scale.setScalar(1 + rise*0.4);
    }
  }

  // breeze
  for (const st of breezeStreaks) {
    if (waveMode) { st.visible = false; continue; }
    st.visible = true;
    const d = st.userData;
    d.life += dt;
    st.position.x += d.dir * d.speed * dt;
    st.position.y = hillAt(st.position.z) + d.baseY + Math.sin(t*1.2 + st.position.z)*0.4*d.wobble*3;
    st.position.z += state.speed * dt * 0.15;
    const k = d.life / d.maxLife;
    const fade = Math.sin(Math.min(1,k)*Math.PI);
    st.material.opacity = fade * 0.16;
    if (d.life >= d.maxLife || Math.abs(st.position.x - car.position.x) > 42) resetStreak(st);
  }

  // snow fall
  if (themeName === 'snow') {
    const arr = snowGeo.attributes.position.array;
    const cxs = car.position.x, czs = state.worldZ, cyGround = hillAt(czs);
    for (let i = 0; i < SNOW_N; i++) {
      arr[i*3+1] -= snowVel[i] * dt;
      arr[i*3]   += Math.sin(t*1.5 + i) * 6 * dt;
      if (arr[i*3+1] < cyGround - 1) {
        arr[i*3]   = cxs + (Math.random()-0.5) * 120;
        arr[i*3+1] = cyGround + 45 + Math.random()*15;
        arr[i*3+2] = czs + (Math.random()-0.5) * 200;
      }
      const relZ = arr[i*3+2] - czs;
      if (relZ > 120) arr[i*3+2] -= 220;
      else if (relZ < -160) arr[i*3+2] += 220;
    }
    snowGeo.attributes.position.needsUpdate = true;
  }

  if (leafGroup.visible) {
    const cz = state.worldZ, cy = hillAt(cz);
    for (const m of leaves) {
      const d = m.userData;
      m.position.y -= d.fall * dt;
      m.position.x += (d.drift + Math.sin(t*1.2 + d.phase)*2) * dt;
      m.rotation.z += d.spin * dt;
      m.rotation.x += d.spin * 0.5 * dt;
      const relZ = m.position.z - cz;
      if (m.position.y < cy - 1 || relZ > 45 || relZ < -130) placeLeaf(m, cz);
    }
  }

  if (waveMode) {
    const ahead = 620;
    sunDisc.position.set(
      state.carX * 0.15,
      hillAt(state.worldZ) + 70,
      state.worldZ - ahead
    );
    sunDisc.rotation.set(0, 0, 0);
    starGroup.position.set(state.carX, 0, state.worldZ);
  }

  if (phase === 'driving') recycle();

  // camera
  const cz = state.worldZ;
  const cx = car.position.x;
  const carY = hillAt(cz);

  if (phase !== 'driving') {
    const hx = house.position.x, hz = house.position.z, hy = house.position.y;
    const push = Math.min(1, parkT / 6);
    const camGoalX = hx + 16 - push*3;
    const camGoalY = hy + 9 - push*2.5;
    const camGoalZ = hz + 20 - push*4;
    camState.cinX = (camState.cinX ?? camera.position.x);
    camState.cinY = (camState.cinY ?? camera.position.y);
    camState.cinZ = (camState.cinZ ?? camera.position.z);
    camState.cinX += (camGoalX - camState.cinX) * Math.min(1, dt*1.5);
    camState.cinY += (camGoalY - camState.cinY) * Math.min(1, dt*1.5);
    camState.cinZ += (camGoalZ - camState.cinZ) * Math.min(1, dt*1.5);
    camera.position.set(camState.cinX, camState.cinY, camState.cinZ);
    const gx = house.position.x + garageMouth.position.x;
    camera.lookAt((cx + gx)/2, carY + 1.6, (cz + hz)/2);
    sun.position.set(hx - 40, hy + 80, hz + 30);
    sun.target.position.set(hx, hy, hz);
    camera.fov += (55 - camera.fov) * Math.min(1, dt*3);
    camera.updateProjectionMatrix();
  } else {
    // chase cam
    camState.heading += (state.heading - camState.heading) * Math.min(1, dt*4);
    camState.x += (cx - camState.x) * Math.min(1, dt*6);
    const chx = camState.x;
    const fx = Math.sin(camState.heading), fz = -Math.cos(camState.heading);
    const sp = state.speed / state.maxSpeed;
    camState.pull = (camState.pull ?? 0) + (sp - (camState.pull ?? 0)) * Math.min(1, dt*2);
    if (camMode === 0) {
      const trail = 11 + camState.pull*2.4;
      const bz = cz - fz*trail;
      camState.y += ((carY + 4.4 + camState.pull*0.6) - camState.y) * Math.min(1, dt*3);
      camState.y = Math.max(camState.y, hillAt(bz) + 1.4);
      camera.position.set(chx - fx*trail, camState.y, bz);
      camera.lookAt(cx + fx*6, carY + 2.2, cz + fz*6);
    } else if (camMode === 1) {
      const trail = 6.5 + camState.pull*1.5;
      const bz = cz - fz*trail;
      camState.y += ((carY + 1.7) - camState.y) * Math.min(1, dt*3);
      camState.y = Math.max(camState.y, hillAt(bz) + 0.9);
      camera.position.set(chx - fx*trail, camState.y, bz);
      camera.lookAt(cx + fx*8, carY + 1.5, cz + fz*8);
    } else {
      camera.position.set(cx, carY + 34, cz + 4);
      camera.lookAt(cx, carY, cz - 8);
    }
    const targetFov = camMode === 2 ? 55 : 55 + camState.pull*5;
    camera.fov += (targetFov - camera.fov) * Math.min(1, dt*3);
    camera.updateProjectionMatrix();
  }

  if (phase === 'driving') {
    sun.position.set(car.position.x - 40, hillAt(cz) + 80, cz + 30);
    sun.target.position.set(car.position.x, hillAt(cz), cz - 10);
  }

  // audio tracking
  if (audio && audioOn) {
    const sp = state.speed / state.maxSpeed;
    const now = audio.ctx.currentTime;
    audio.osc1.frequency.setTargetAtTime(48 + sp*95, now, 0.25);
    audio.osc2.frequency.setTargetAtTime(48.4 + sp*95, now, 0.25);
    audio.osc3.frequency.setTargetAtTime(24 + sp*47, now, 0.25);
    audio.evFilter.frequency.setTargetAtTime(420 + sp*1200, now, 0.3);
    audio.evGain.gain.setTargetAtTime(0.02 + sp*0.08, now, 0.25);
    audio.tireFilter.frequency.setTargetAtTime(280 + sp*1000, now, 0.25);
    audio.tireGain.gain.setTargetAtTime(sp*0.07, now, 0.25);
    audio.windGain.gain.setTargetAtTime(0.015 + sp*0.045, now, 0.3);
    const corner = Math.abs(state.steer) * sp;
    const slip = Math.max(0, corner - 0.28);
    const screech = Math.min(1, slip * 3.2);
    if (audio.screechGain) {
      audio.screechGain.gain.setTargetAtTime(screech * 0.14, now, screech > 0.01 ? 0.05 : 0.2);
      audio.screechFilter.frequency.setTargetAtTime(1400 + screech*900, now, 0.1);
    }
  }

  // hud
  const kmh = state.speed * 3.6 * SPEEDO;
  if (useMph) {
    spdEl.textContent = Math.round(kmh * 0.621371);
  } else {
    spdEl.textContent = Math.round(kmh);
  }
  spdFill.style.width = (100 * state.speed / state.maxSpeed).toFixed(1) + '%';

  renderer.render(scene, camera);

  if (!window.__loaded) {
    window.__loaded = true;
    const loader = document.getElementById('loader');
    if (loader) {
      setTimeout(() => {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 800);
      }, 500);
    }
  }

  requestAnimationFrame(frame);
}
frame();

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  [rw, rh] = renderSize();
  renderer.setSize(rw, rh, false);
});
</script>
